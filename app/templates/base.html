<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AutoPR Reviewer{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
        }

        nav {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        nav .logo { font-weight: 700; font-size: 1.1rem; color: #e6edf3; }
        nav a { color: #8b949e; font-size: 0.9rem; }
        nav a:hover { color: #e6edf3; text-decoration: none; }

        .btn {
            display: inline-block;
            padding: 0.65rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.15s;
        }
        .btn-primary { background: #238636; color: #fff; border-color: #2ea043; }
        .btn-primary:hover { background: #2ea043; text-decoration: none; }
        .btn-secondary { background: #21262d; color: #e6edf3; border-color: #30363d; }
        .btn-secondary:hover { background: #30363d; text-decoration: none; }
        .btn-pro { background: #8957e5; color: #fff; border-color: #a371f7; }
        .btn-pro:hover { background: #a371f7; text-decoration: none; }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-basic { background: #21262d; color: #8b949e; }
        .badge-pro { background: #8957e5; color: #fff; }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: #484f58;
            font-size: 0.85rem;
            border-top: 1px solid #30363d;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <span class="logo">🤖 AutoPR Reviewer</span>
        <a href="/">Home</a>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        AutoPR Reviewer &mdash; AI-powered GitHub PR reviews
    </footer>
</body>
</html>
